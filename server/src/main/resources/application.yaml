server:
  port: 8080
  servlet:
    context-path: /abtechzone

spring:
  application:
    name: ABTechZone
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  data:
    redis:
      url: ${REDIS_ADDRESS:redis://localhost:3308}

jwt:
  signerKey: ${JWT_SIGNER_KEY}
  valid-duration: 86400 # in second
  refreshable-duration: 259200 #seconds
